services:
  - type: web
    name: perfecthome
    env: python
    buildCommand: "pip install --use-deprecated=legacy-resolver -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --run-syncdb"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: perfecthome
      - key: CONTACT_ADDRESS
        value: "Tashkent, Uzbekistan"
      - key: CONTACT_PHONE
        value: "+998 (00) 000-00-00"
      - key: CONTACT_EMAIL
        value: "info@perfecthome.uz"
      - key: CONTACT_MAP_EMBED_URL
        value: "https://www.google.com/maps"
