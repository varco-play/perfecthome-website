{% extends 'admin_panel/base_admin.html' %}

{% block title %}Редактирование поста{% endblock %}
{% block header %}Редактирование поста "{{ post.title }}"{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">Заголовок *</label>
                            <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Slug *</label>
                            <input type="text" name="slug" class="form-control" value="{{ post.slug }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Заголовок (UZ)</label>
                        <input type="text" name="title_uz" class="form-control" value="{{ post.title_uz }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Текущая обложка</label>
                        {% if post.cover_image %}
                            <div class="mb-2">
                                <img src="{{ post.cover_image.url }}" style="max-height: 150px;" class="img-thumbnail">
                            </div>
                        {% endif %}
                        <label class="form-label">Изменить обложку</label>
                        <input type="file" name="cover_image" class="form-control" accept="image/*">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Содержание *</label>
                        <textarea name="content" class="form-control" rows="10" required>{{ post.content }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Содержание (UZ)</label>
                        <textarea name="content_uz" class="form-control" rows="10">{{ post.content_uz }}</textarea>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'users:admin_blog_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Назад
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Сохранить изменения
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
