{% extends 'admin_panel/base_admin.html' %}

{% block title %}Редактирование категории{% endblock %}
{% block header %}Редактирование категории "{{ category.name }}"{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Название категории *</label>
                        <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Название категории (UZ)</label>
                        <input type="text" name="name_uz" class="form-control" value="{{ category.name_uz }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Slug *</label>
                        <input type="text" name="slug" class="form-control" value="{{ category.slug }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Описание</label>
                        <textarea name="description" class="form-control" rows="4">{{ category.description }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Описание (UZ)</label>
                        <textarea name="description_uz" class="form-control" rows="4">{{ category.description_uz }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Текущее изображение</label>
                        <div class="mb-2">
                            {% if category.image %}
                            <img src="{{ category.image.url }}" alt="{{ category.name }}" style="width: 140px; height: 90px; object-fit: cover; border-radius: 6px;">
                            {% else %}
                            <span class="text-muted">Нет изображения</span>
                            {% endif %}
                        </div>
                        <label class="form-label">Изменить изображение</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'users:admin_category_list' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Назад
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Сохранить изменения
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
