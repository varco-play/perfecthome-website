{% load i18n %}

{% block title %}{% trans "Sign In" %}{% endblock %}

<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f7f5;padding:2rem;">
  <div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:40px 36px;width:100%;max-width:420px;">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#aaa;margin-bottom:8px;">Perfect Home</div>
      <h1 style="font-size:24px;font-weight:600;color:#1a1a1a;margin:0 0 6px;">{% trans "Sign In" %}</h1>
      <p style="font-size:13px;color:#888;margin:0;">{% trans "Welcome back — enter your details below" %}</p>
    </div>

    <form method="post" action="{% url 'users:login' %}">
      {% csrf_token %}

      <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:24px;">

        <!-- Username -->
        <div>
          <label for="username"
                 style="display:block;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#888;margin-bottom:6px;">
            {% trans "Username" %}
          </label>
          <input type="text"
                 name="username"
                 id="username"
                 placeholder="{% trans 'Enter your username' %}"
                 required
                 style="width:100%;padding:10px 14px;font-size:14px;background:#f8f7f5;border:1px solid {% if error %}#e05c4b{% else %}#e0e0e0{% endif %};border-radius:8px;color:#1a1a1a;outline:none;transition:border-color 0.2s;font-family:inherit;"
                 onfocus="this.style.borderColor='#1a1a1a'"
                 onblur="this.style.borderColor='{% if error %}#e05c4b{% else %}#e0e0e0{% endif %}'">
        </div>

        <!-- Password -->
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <label for="password"
                   style="font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#888;">
              {% trans "Password" %}
            </label>
          </div>
          <div style="position:relative;">
            <input type="password"
                   name="password"
                   id="password"
                   placeholder="{% trans 'Enter your password' %}"
                   required
                   style="width:100%;padding:10px 56px 10px 14px;font-size:14px;background:#f8f7f5;border:1px solid {% if error %}#e05c4b{% else %}#e0e0e0{% endif %};border-radius:8px;color:#1a1a1a;outline:none;transition:border-color 0.2s;font-family:inherit;"
                   onfocus="this.style.borderColor='#1a1a1a'"
                   onblur="this.style.borderColor='{% if error %}#e05c4b{% else %}#e0e0e0{% endif %}'">
            <button type="button"
                    id="toggle-pw"
                    onclick="var p=document.getElementById('password');p.type=p.type==='password'?'text':'password';this.textContent=p.type==='password'?'Show':'Hide'"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#aaa;cursor:pointer;padding:4px;">
              {% trans "Show" %}
            </button>
          </div>
        </div>

        <!-- Error -->
        {% if error %}
          <div style="background:#fdf0ee;border:1px solid #f5c5bb;border-radius:8px;padding:10px 14px;font-size:13px;color:#c0392b;">
            {{ error }}
          </div>
        {% endif %}

      </div>


      <!-- Submit -->
      <button type="submit"
              style="width:100%;padding:12px;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity 0.2s;font-family:inherit;"
              onmouseover="this.style.opacity='0.82'"
              onmouseout="this.style.opacity='1'">
        {% trans "Sign In" %}
      </button>

    </form>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:12px;margin:20px 0;">
      <div style="flex:1;height:1px;background:#eee;"></div>
      <span style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#ccc;">{% trans "or" %}</span>
      <div style="flex:1;height:1px;background:#eee;"></div>
    </div>

    <!-- Register link -->

  </div>
</div>
